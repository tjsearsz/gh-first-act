name: Deploy project

on: [push, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          #cache: pnpm #optional

        #The modern way is to instead do | (pipe) corepack enable pnpm install
      - name: Install PNPM
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
  deploy:
    needs: test # [test, job2]
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          #cache: pnpm #optional

        #The modern way is to instead do | (pipe) corepack enable pnpm install
      - name: Install PNPM
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Deploy
        run: echo "Deploying ..."
